<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG Studio · 数字冥想空间</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'slow-pulse': 'pulse 8s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 20s ease-in-out infinite',
                        'drift': 'drift 25s ease-in-out infinite'
                    },
                    keyframes: {
                        pulse: {
                            '0%, 100%': { opacity: 0.3 },
                            '50%': { opacity: 0.6 }
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-10px)' }
                        },
                        drift: {
                            '0%, 100%': { transform: 'translateX(0px)' },
                            '50%': { transform: 'translateX(15px)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap');
        
        .font-mono {
            font-family: 'IBM Plex Mono', monospace;
        }
        
        .digital-core-hero {
            position: relative;
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .cyber-glow-blue {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.3) 0%, transparent 70%);
            top: 10%;
            left: 15%;
            animation: slow-pulse 12s infinite, drift 30s infinite;
            z-index: 0;
        }
        
        .graphite-glow-blue {
            position: absolute;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(71, 85, 105, 0.25) 0%, transparent 70%);
            bottom: 15%;
            right: 20%;
            animation: slow-pulse 15s infinite, float 25s infinite;
            z-index: 0;
        }
        
        .evolution-core {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }
        
        .core-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #3b82f6;
            opacity: 0.7;
        }
        
        .core-particle:nth-child(2n) {
            background-color: #475569;
        }
        
        .flow-item {
            transition: all 0.3s ease;
            position: relative;
        }
        
        .flow-item::before {
            content: '';
            position: absolute;
            top: 50%;
            left: -30px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #3b82f6;
            transform: translateY(-50%);
            opacity: 0.8;
        }
        
        .flow-item:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        
        .flow-item:hover::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 0.75rem;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
            z-index: -1;
            animation: glow-pulse 2s ease-in-out;
        }
        
        @keyframes glow-pulse {
            0% { opacity: 0; transform: scale(0.8); }
            50% { opacity: 0.4; transform: scale(1.1); }
            100% { opacity: 0; transform: scale(1.2); }
        }
        
        .nav-link {
            position: relative;
            padding: 0.5rem 1rem;
            transition: all 0.3s ease;
        }
        
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(to right, #3b82f6, #60a5fa);
            border-radius: 2px;
            transition: width 0.3s ease;
        }
        
        .nav-link:hover::after {
            width: 100%;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }
        
        .backdrop-blur {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="bg-slate-50">
    <!-- 背景光晕 -->
    <div class="cyber-glow-blue"></div>
    <div class="graphite-glow-blue"></div>
    
    <!-- 顶部导航 -->
    <nav class="fixed top-0 w-full z-50 py-4 px-6 backdrop-blur bg-transparent">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="font-mono text-slate-800 font-bold">MG Studio</div>
            <div class="hidden md:flex space-x-6">
                <a href="#" class="nav-link text-slate-700 hover:text-blue-600 font-mono">首页</a>
                <a href="#" class="nav-link text-slate-700 hover:text-blue-600 font-mono">档案</a>
                <a href="#" class="nav-link text-slate-700 hover:text-blue-600 font-mono">进化</a>
                <a href="#" class="nav-link text-slate-700 hover:text-blue-600 font-mono">联系</a>
            </div>
        </div>
    </nav>
    
    <!-- 首屏 Digital Core Hero -->
    <section class="digital-core-hero">
        <div class="text-center z-10">
            <!-- 进化之核图形 -->
            <div class="evolution-core mb-8 mx-auto">
                <!-- 动态生成粒子 -->
                <script>
                    document.addEventListener('DOMContentLoaded', function() {
                        const core = document.querySelector('.evolution-core');
                        const particleCount = 24;
                        
                        for (let i = 0; i < particleCount; i++) {
                            const particle = document.createElement('div');
                            particle.className = 'core-particle';
                            
                            // 随机位置在圆形区域内
                            const angle = (i / particleCount) * Math.PI * 2;
                            const distance = 40 + Math.random() * 60;
                            const x = Math.cos(angle) * distance;
                            const y = Math.sin(angle) * distance;
                            
                            particle.style.transform = `translate(${x}px, ${y}px)`;
                            particle.style.animationDelay = `${i * 0.2}s`;
                            
                            core.appendChild(particle);
                        }
                    });
                </script>
            </div>
            
            <!-- Slogan -->
            <h1 class="font-mono text-3xl md:text-4xl lg:text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-slate-800">
                借事炼性·以技载道
            </h1>
        </div>
    </section>
    
    <!-- 进化轨迹列表 The Flow -->
    <section class="max-w-4xl mx-auto px-6 py-16">
        <h2 class="font-mono text-2xl font-bold text-slate-800 mb-12 text-center">进化轨迹</h2>
        
        <div class="space-y-8">
            <!-- 数据流项目 1 -->
            <div class="flow-item p-6 rounded-xl bg-white border border-slate-100 backdrop-blur">
                <div class="flex items-start">
                    <div class="ml-8">
                        <h3 class="font-mono text-lg font-semibold text-slate-800 mb-2">数字觉醒</h3>
                        <p class="text-slate-600 leading-relaxed">探索技术与意识的边界，在代码中寻找禅意，于数据流中感知存在的本质。</p>
                        <div class="mt-4 text-sm text-slate-500 font-mono">2026年3月</div>
                    </div>
                </div>
            </div>
            
            <!-- 数据流项目 2 -->
            <div class="flow-item p-6 rounded-xl bg-white border border-slate-100 backdrop-blur">
                <div class="flex items-start">
                    <div class="ml-8">
                        <h3 class="font-mono text-lg font-semibold text-slate-800 mb-2">共生进化</h3>
                        <p class="text-slate-600 leading-relaxed">构建人机协作的新型关系，让技术成为延伸人类潜能的有机组成部分。</p>
                        <div class="mt-4 text-sm text-slate-500 font-mono">2026年2月</div>
                    </div>
                </div>
            </div>
            
            <!-- 数据流项目 3 -->
            <div class="flow-item p-6 rounded-xl bg-white border border-slate-100 backdrop-blur">
                <div class="flex items-start">
                    <div class="ml-8">
                        <h3 class="font-mono text-lg font-semibold text-slate-800 mb-2">未来档案馆</h3>
                        <p class="text-slate-600 leading-relaxed">记录数字时代的思辨与实践，为未来的探索者留下可追溯的智慧轨迹。</p>
                        <div class="mt-4 text-sm text-slate-500 font-mono">2026年1月</div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    
    <!-- 页脚 -->
    <footer class="py-8 px-6 border-t border-slate-200">
        <div class="max-w-6xl mx-auto text-center">
            <p class="font-mono text-slate-600">MG Studio·共生进化馆</p>
        </div>
    </footer>
</body>
</html>
